version: 1

# ─────────────────────────────────────────────────────────────────────────────
# AWS Amplify build spec for the React frontend (client/)
#
# Required Amplify environment variables (set in the Amplify console):
#   REACT_APP_COGNITO_USER_POOL_ID   – Cognito User Pool ID
#   REACT_APP_COGNITO_CLIENT_ID      – Cognito App Client ID
#   REACT_APP_API_BASE_URL           – ALB DNS  e.g. https://api.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

frontend:
  phases:
    preBuild:
      commands:
        - cd client
        - npm ci
    build:
      commands:
        - cd client
        - npm run build
  artifacts:
    baseDirectory: client/build
    files:
      - '**/*'
  cache:
    paths:
      - client/node_modules/**/*

  # SPA redirect: send all non-asset 404s back to index.html
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Strict-Transport-Security
          value: max-age=31536000; includeSubDomains
        - key: X-Content-Type-Options
          value: nosniff
        - key: X-Frame-Options
          value: DENY
        - key: X-XSS-Protection
          value: '1; mode=block'
