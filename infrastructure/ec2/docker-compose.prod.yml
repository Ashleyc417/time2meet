# Production docker-compose for EC2 instances
#
# This file is placed in /opt/time2meet/ on each EC2 instance by the deploy
# workflow (or during initial bootstrap via user-data.sh).
#
# Images are pulled from ECR – no local builds happen on EC2.
# Secrets are read from /opt/time2meet/.env.common (written by user-data.sh
# from SSM Parameter Store – never committed to the repository).
#
# Container logs are shipped to CloudWatch Logs via the awslogs driver.
# The IAM instance profile (ec2-instance-policy.json) grants the
# logs:PutLogEvents permission required for this to work.
#
# ALB health check target: GET /api/health → HTTP 200
# Each service exposes /api/health so the ALB can check all three target groups.

x-logging: &cloudwatch-logging
  driver: awslogs
  options:
    awslogs-region: "${AWS_REGION}"
    awslogs-group:  "/time2meet"
    awslogs-create-group: "true"

x-common-env: &common-env
  NODE_ENV:               production
  DATABASE_TYPE:          mariadb
  MYSQL_HOST:             "${MYSQL_HOST}"
  MYSQL_PORT:             "${MYSQL_PORT:-3306}"
  MYSQL_USER:             "${MYSQL_USER}"
  MYSQL_PASSWORD:         "${MYSQL_PASSWORD}"
  MYSQL_DATABASE:         "${MYSQL_DATABASE}"
  PUBLIC_URL:             "${PUBLIC_URL}"
  ENABLE_CORS:            "true"
  TRUST_PROXY:            "true"
  VERIFY_SIGNUP_EMAIL_ADDRESS: "true"
  COGNITO_REGION:         "${COGNITO_REGION}"
  COGNITO_USER_POOL_ID:   "${COGNITO_USER_POOL_ID}"
  COGNITO_CLIENT_ID:      "${COGNITO_CLIENT_ID}"
  SMTP_HOST:              "${SMTP_HOST}"
  SMTP_PORT:              "${SMTP_PORT}"
  SMTP_FROM:              "${SMTP_FROM}"
  SMTP_USER:              "${SMTP_USER}"
  SMTP_PASSWORD:          "${SMTP_PASSWORD}"

services:
  # ── Auth Service (port 3001) ─────────────────────────────────────────────
  # ALB rules → /api/signup, /api/login, /api/logout, /api/verify-email,
  #             /api/reset-password, /api/confirm-password-reset,
  #             /api/*-with-google, /api/*-with-microsoft,
  #             /api/server-info, /redirect/*
  auth-service:
    image: "${ECR_REGISTRY}/time2meet/auth-service:latest"
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-region:       "${AWS_REGION}"
        awslogs-group:        "/time2meet"
        awslogs-stream-prefix: "auth"
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Meetings Service (port 3002) ─────────────────────────────────────────
  # ALB rules → /api/meetings, /api/meetings/*
  meetings-service:
    image: "${ECR_REGISTRY}/time2meet/meetings-service:latest"
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "3002"
      HOST: "0.0.0.0"
    ports:
      - "3002:3002"
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-region:       "${AWS_REGION}"
        awslogs-group:        "/time2meet"
        awslogs-stream-prefix: "meetings"
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Users Service (port 3003) ────────────────────────────────────────────
  # ALB rules → /api/me, /api/me/*, default
  users-service:
    image: "${ECR_REGISTRY}/time2meet/users-service:latest"
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: "3003"
      HOST: "0.0.0.0"
    ports:
      - "3003:3003"
    logging:
      <<: *cloudwatch-logging
      options:
        awslogs-region:       "${AWS_REGION}"
        awslogs-group:        "/time2meet"
        awslogs-stream-prefix: "users"
        awslogs-create-group: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
